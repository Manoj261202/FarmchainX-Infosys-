<div class="admin-shell flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <app-admin-sidebar class="hidden lg:flex flex-shrink-0"></app-admin-sidebar>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <header
      class="sticky top-0 z-40 flex items-center justify-between px-7 py-4"
      style="
        background: rgba(3, 18, 8, 0.95);
        border-bottom: 1px solid rgba(74, 222, 128, 0.12);
        backdrop-filter: blur(20px);
      "
    >
      <div class="flex items-center gap-4">
        <button
          (click)="toggleSidebar()"
          class="p-2 rounded-xl lg:hidden"
          style="
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
          "
        >
          ☰
        </button>
        <div>
          <h1 class="text-xl font-black text-white">Dashboard</h1>
          <p class="text-xs mt-0.5" style="color: rgba(255, 255, 255, 0.35)">
            Welcome back,
            <span style="color: #4ade80; font-weight: 700">{{ currentAdminName() }}</span>
          </p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div
          class="flex items-center gap-2 px-4 py-2 rounded-full"
          style="background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(74, 222, 128, 0.25)"
        >
          <div class="w-2 h-2 rounded-full bg-green-400"></div>
          <span class="text-xs font-bold" style="color: #4ade80">Operational</span>
        </div>
        <button
          class="w-9 h-9 rounded-xl flex items-center justify-center text-base"
          style="
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
          "
        >
          🔔
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto px-7 py-7">
      <router-outlet></router-outlet>
    </main>

    <!-- Footer -->
    <footer
      class="px-7 py-3 flex items-center justify-between"
      style="background: rgba(3, 18, 8, 0.95); border-top: 1px solid rgba(74, 222, 128, 0.08)"
    >
      <p class="text-xs" style="color: rgba(255, 255, 255, 0.2)">
        © 2025 <span style="color: #4ade80">FarmChainX</span> Admin Portal
      </p>
      <div class="flex gap-4">
        <a href="#" class="text-xs" style="color: rgba(255, 255, 255, 0.2)">Documentation</a>
        <a href="#" class="text-xs" style="color: rgba(255, 255, 255, 0.2)">Support</a>
        <a href="#" class="text-xs" style="color: rgba(255, 255, 255, 0.2)">Privacy</a>
      </div>
    </footer>
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div *ngIf="sidebarOpen" class="fixed inset-0 z-50 lg:hidden" (click)="toggleSidebar()">
    <div
      class="absolute inset-0"
      style="background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px)"
    ></div>
    <div class="absolute left-0 top-0 h-full" (click)="$event.stopPropagation()">
      <app-admin-sidebar></app-admin-sidebar>
    </div>
  </div>
</div>
