<div class="min-h-screen pb-12" style="background: transparent">
  <!-- Header -->
  <div class="mb-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 rounded-xl flex items-center justify-center text-xl"
        style="background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(74, 222, 128, 0.3)"
      >
        🔔
      </div>
      <div>
        <h2 class="text-2xl font-black text-white">Notifications</h2>
        <p class="text-xs" style="color: rgba(255, 255, 255, 0.35)">
          Stay updated with your orders and activities
        </p>
      </div>
    </div>
    <button
      (click)="clearAll()"
      class="px-4 py-2 rounded-xl text-xs font-black transition-all"
      style="
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      "
    >
      🗑️ Clear All
    </button>
  </div>

  <!-- Notifications List -->
  <div class="space-y-3">
    <div
      *ngFor="let n of notifications()"
      class="rounded-2xl p-5 transition-all duration-300"
      [style.opacity]="n.read ? '0.6' : '1'"
      style="background: rgba(3, 18, 8, 0.7); border: 1px solid rgba(74, 222, 128, 0.15)"
    >
      <div class="flex items-start gap-4">
        <div
          class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
          style="background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(74, 222, 128, 0.2)"
        >
          🔔
        </div>
        <div class="flex-grow">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="font-black text-white text-sm">{{ n.title }}</p>
              <p class="text-xs mt-1" style="color: rgba(255, 255, 255, 0.5)">{{ n.body }}</p>
              <p class="text-xs mt-2" style="color: rgba(255, 255, 255, 0.25)">🕐 {{ n.time }}</p>
            </div>
            <div>
              <button
                *ngIf="!n.read"
                (click)="markRead(n)"
                class="px-3 py-1.5 rounded-lg text-xs font-black text-white transition-all whitespace-nowrap"
                style="background: linear-gradient(135deg, #22c55e, #15803d)"
              >
                Mark Read
              </button>
              <span
                *ngIf="n.read"
                class="text-xs font-bold px-3 py-1.5 rounded-lg"
                style="background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.3)"
              >
                ✅ Read
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div
      *ngIf="notifications().length === 0"
      class="text-center py-16 rounded-2xl"
      style="background: rgba(3, 18, 8, 0.5); border: 1px dashed rgba(74, 222, 128, 0.2)"
    >
      <div class="text-5xl mb-3">🔕</div>
      <p class="font-bold text-sm" style="color: rgba(255, 255, 255, 0.4)">No notifications yet</p>
      <p class="text-xs mt-1" style="color: rgba(255, 255, 255, 0.2)">
        You're all caught up! Check back later.
      </p>
    </div>
  </div>
</div>
